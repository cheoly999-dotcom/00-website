<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Computing</title>
    <link rel="stylesheet" type="text/css" href="style.css" />
  </head>
  <body>
    <main class="home" aria-label="Interactive Computing weekly archive">
      <section class="intro" aria-label="Course information">

      <section class="pattern-board" aria-label="Week folders">

          <span></span>
